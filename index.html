<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>欧冠专属 | 20元保守/激进预测+自动复盘胜率</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
body{background:#121826;color:#eee;padding:20px}
h1{text-align:center;color:#4fc3f7;margin:20px 0}
.desc{text-align:center;color:#aaa;margin-bottom:25px}
.card{background:#1e293b;border-radius:12px;padding:22px;max-width:850px;margin:18px auto}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:12px 0}
.item{background:#273444;padding:12px;border-radius:8px}
.betBox{background:#2d3748;border-radius:10px;padding:16px;margin:15px 0}
.safe{color:#4ade80;font-weight:bold}
.risk{color:#f87171;font-weight:bold}
.statBox{background:#232f40;border:1px solid #ffd700;border-radius:10px;padding:20px;max-width:850px;margin:30px auto}
.refreshBtn{display:block;margin:20px auto;padding:12px 26px;background:#17a2b8;color:#fff;border:none;border-radius:8px;cursor:pointer}
.hit{color:#69f0ae}.miss{color:#ff5252}
</style>
</head>
<body>

<h1>⚽ 欧冠专属赛事预测系统</h1>
<p class="desc">仅欧冠｜完整年月日赛程｜xG预期｜20元保守/激进｜自动复盘算胜率</p>

<button class="refreshBtn" onclick="initData()">🔄 刷新赛事 & 更新复盘</button>

<div id="matchWrap">加载欧冠赛事中...</div>

<div class="statBox">
  <h3 style="color:#ffd700;margin-bottom:15px">📊 自动复盘 · 实时胜率统计</h3>
  <div id="statText">正在统计...</div>
</div>

<script>
// 全局存储：本地永久复盘记录
let record = JSON.parse(localStorage.getItem("championsRecord")) || {
  total:0, safeHit:0, safeMiss:0, riskHit:0, riskMiss:0, list:[]
};

// 今日日期格式化
function getToday(){return new Date().toISOString().split("T")[0];}

// 1、生成当前欧冠赛程（固定完整年月日、xG、走向）
function getMatchList(){
  const d = getToday();
  return [
    {
      key:"rm-man",
      date:`${d} 03:00`,
      home:"皇家马德里", away:"曼城",
      homeXg:1.21, awayXg:1.93,
      liveScore:"1-2", totalGoals:3,
      status:"进行中", finalScore:"",
      safeTip:"20元保守：客胜 + 2.5大",
      riskTip:"20元激进：比分1-3 / 总进球4+"
    },
    {
      key:"bay-ars",
      date:`${d} 03:00`,
      home:"拜仁慕尼黑", away:"阿森纳",
      homeXg:1.88, awayXg:1.05,
      liveScore:"2-1", totalGoals:3,
      status:"进行中", finalScore:"",
      safeTip:"20元保守：主胜 + 2.5大",
      riskTip:"20元激进：比分3-1 / 总进球4+"
    },
    {
      key:"psg-dor",
      date:`${d} 00:45`,
      home:"巴黎圣日耳曼", away:"多特蒙德",
      homeXg:1.52, awayXg:1.36,
      liveScore:"0-0", totalGoals:0,
      status:"已结束", finalScore:"1-1",
      safeTip:"20元保守：平局 + 2.5小",
      riskTip:"20元激进：精准1-1"
    }
  ];
}

// 2、赛果对错判定
function judgeResult(m){
  if(m.status !== "已结束" || !m.finalScore) return null;
  const [h,a] = m.finalScore.split("-").map(Number);
  const all = h+a;

  let safeOK = false, riskOK = false;

  // 保守判定示例
  if(m.safeTip.includes("客胜") && a>h) safeOK=true;
  if(m.safeTip.includes("主胜") && h>a) safeOK=true;
  if(m.safeTip.includes("平局") && h===a) safeOK=true;
  if(m.safeTip.includes("2.5大") && all>=3) safeOK=true;
  if(m.safeTip.includes("2.5小") && all<=2) safeOK=true;

  // 激进精准比分判定
  if(m.riskTip.includes(m.finalScore)) riskOK=true;

  return {safeOK,riskOK};
}

// 3、写入复盘记录
function saveRecord(mkey,res){
  if(!res || record.list.includes(mkey))return;
  record.total++;
  res.safeOK ? record.safeHit++ : record.safeMiss++;
  res.riskOK ? record.riskHit++ : record.riskMiss++;
  record.list.push(mkey);
  localStorage.setItem("championsRecord",JSON.stringify(record));
}

// 4、渲染页面
function initData(){
  const list = getMatchList();
  let html = "";

  list.forEach(m=>{
    const j = judgeResult(m);
    saveRecord(m.key,j);

    html += `
    <div class="card">
      <div style="color:#ffd700;font-size:19px;margin-bottom:10px">${m.home} VS ${m.away}</div>
      <div class="row">
        <div class="item">📅 比赛时间：${m.date}</div>
        <div class="item">📈 xG预期：主${m.homeXg}｜客${m.awayXg}</div>
        <div class="item">🏆 当前比分：${m.liveScore}</div>
        <div class="item">⚽ 实时总进球：${m.totalGoals}</div>
        <div class="item">📌 状态：${m.status}</div>
        <div class="item">✅ 最终赛果：${m.finalScore||"未完结"}</div>
      </div>
      <div class="betBox">
        <div class="safe">${m.safeTip}</div>
        <div class="risk" style="margin-top:8px">${m.riskTip}</div>
      </div>
      ${j?`
      <div style="margin-top:10px">
        <span class="${j.safeOK?'hit':'miss'}">保守：${j.safeOK?'命中✔':'失误✘'}</span>
        &nbsp;&nbsp;
        <span class="${j.riskOK?'hit':'miss'}">激进：${j.riskOK?'命中✔':'失误✘'}</span>
      </div>
      `:""}
    </div>
    `;
  });

  document.getElementById("matchWrap").innerHTML = html;
  renderStat();
}

// 5、渲染胜率统计
function renderStat(){
  const r = record;
  let safeRate = r.total ? ((r.safeHit/r.total)*100).toFixed(1)+"%" : "0%";
  let riskRate = r.total ? ((r.riskHit/r.total)*100).toFixed(1)+"%" : "0%";

  document.getElementById("statText").innerHTML = `
  总复盘场次：${r.total} 场<br>
  💚 20元保守方案：命中${r.safeHit}｜失误${r.safeMiss}｜综合胜率：${safeRate}<br>
  ❤️ 20元激进方案：命中${r.riskHit}｜失误${r.riskMiss}｜综合胜率：${riskRate}
  `;
}

// 初始化打开
window.onload = initData;
</script>
</body>
</html>
