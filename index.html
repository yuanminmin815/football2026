<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>足球实时分析+赛后命中率复盘</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
        body{background:#121826;color:#eee;padding:20px}
        h1{text-align:center;color:#4fc3f7;margin:20px 0}
        .nav{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
        .nav button{padding:8px 16px;background:#1e293b;color:#4fc3f7;border:none;border-radius:6px;cursor:pointer}
        .nav button.active{background:#4fc3f7;color:#000}
        .card{background:#1e293b;border-radius:10px;padding:20px;margin:15px auto;max-width:1000px}
        .res-card{background:#232f40;border-radius:10px;padding:20px;margin:20px auto;max-width:1000px;border:2px solid #ffd700;}
        .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px}
        .box{background:#273444;padding:15px;border-radius:8px}
        .title{font-size:18px;color:#ffd700;margin-bottom:10px}
        .info{color:#81d4fa;margin-bottom:12px}
        .xg{color:#ff9800;font-weight:bold;margin:4px 0}
        .safe{color:#4caf50}
        .risk{color:#f44336;margin-top:8px}
        .hit{color:#69f0ae;font-weight:bold;}
        .miss{color:#ff5252;font-weight:bold;}
        .loading{text-align:center;padding:40px;color:#4fc3f7}
        .tip{text-align:center;color:#aaa;margin-top:20px}
        .stat-line{font-size:16px;margin:8px 0;}
    </style>
</head>
<body>

<h1>⚽ 实时赛事分析 + 赛后方案命中率复盘</h1>

<div class="nav">
    <button class="active" onclick="showAll()">全部赛事</button>
    <button onclick="showLeague('英超')">英超</button>
    <button onclick="showLeague('西甲')">西甲</button>
    <button onclick="showLeague('意甲')">意甲</button>
    <button onclick="showLeague('欧冠')">欧冠</button>
    <button onclick="showHistory()">赛后复盘统计</button>
</div>

<!-- 赛后命中率总复盘模块 -->
<div id="statBlock" class="res-card" style="display:none;">
    <h2 style="text-align:center;color:#ffd700;margin-bottom:15px;">📊 历史推荐命中率总评</h2>
    <div class="stat-line">总已完结赛事：<span id="totalCount">0</span> 场</div>
    <div class="stat-line">✅ 保本方案命中：<span id="safeHit">0</span> 场</div>
    <div class="stat-line">❌ 保本方案失误：<span id="safeMiss">0</span> 场</div>
    <div class="stat-line">📈 保本综合正确率：<span id="safeRate">0%</span></div>
    <div style="height:1px;background:#444;margin:12px 0;"></div>
    <div class="stat-line">🔥 激进方案命中：<span id="riskHit">0</span> 场</div>
    <div class="stat-line">💥 激进方案失误：<span id="riskMiss">0</span> 场</div>
    <div class="stat-line">📉 激进综合正确率：<span id="riskRate">0%</span></div>
    <div class="tip">数据自动本地存档，清除浏览器缓存才会重置</div>
</div>

<div id="container" class="loading">正在加载当天所有比赛...</div>
<div class="tip">30秒自动刷新｜赛后自动判定推荐对错｜留存历史命中率</div>

<script>
// ==================== 1. 基础赛事库 ====================
const ALL_MATCHES = [
    { league:"英超", home:"曼城", away:"利物浦", time:"20:00", status:"未开赛", score:"0-0",finalScore:"" },
    { league:"英超", home:"阿森纳", away:"阿斯顿维拉", time:"22:00", status:"未开赛", score:"0-0",finalScore:"" },
    { league:"英超", home:"曼联", away:"切尔西", time:"23:00", status:"未开赛", score:"0-0",finalScore:"" },
    { league:"意甲", home:"AC米兰", away:"佛罗伦萨", time:"18:00", status:"已结束", score:"2-1",finalScore:"2-1" },
    { league:"意甲", home:"国际米兰", away:"乌迪内斯", time:"21:00", status:"未开赛", score:"0-0",finalScore:"" },
    { league:"意甲", home:"尤文图斯", away:"博洛尼亚", time:"20:00", status:"已结束", score:"1-0",finalScore:"1-0" },
    { league:"西甲", home:"巴塞罗那", away:"皇马", time:"23:15", status:"未开赛", score:"0-0",finalScore:"" },
    { league:"欧冠", home:"皇家马德里", away:"拜仁慕尼黑", time:"03:00", status:"未开赛", score:"0-0",finalScore:"" }
];

// ==================== 2. 本地历史命中率存档 ====================
let historyData = JSON.parse(localStorage.getItem("matchHistory")) || {
    total:0,
    safeHit:0,
    safeMiss:0,
    riskHit:0,
    riskMiss:0,
    list:[]
};

let currentLeague = "all";
let showStat = false;

// ==================== 3. xG + 推荐算法 ====================
function calcXG(home, away) {
    let h = (Math.random() * 0.9 + 0.8).toFixed(2);
    let a = (Math.random() * 0.75 + 0.7).toFixed(2);
    const top = ["皇马","巴萨","曼城","阿森纳","利物浦","尤文","国米","AC米兰"];
    if(top.includes(home)) h = (parseFloat(h)+0.4).toFixed(2);
    if(top.includes(away)) a = (parseFloat(a)+0.35).toFixed(2);
    h = (parseFloat(h)+0.15).toFixed(2);
    let total = (parseFloat(h)+parseFloat(a)).toFixed(2);
    return {hx:h,ax:a,total,big:total>=2.7};
}

function getPlan(xg){
    let h=parseFloat(xg.hx),a=parseFloat(xg.ax);
    if(h>a+0.3){
        return {safe:"主胜+2/3球容错",risk:"主胜博高球",type:"home"};
    }else if(a>h+0.3){
        return {safe:"客胜+2/3球容错",risk:"客胜博高球",type:"away"};
    }else{
        return {safe:"平局+2/3球容错",risk:"平局博小球",type:"draw"};
    }
}

// ==================== 4. 赛后自动判对错核心 ====================
function judgeResult(match,xg,plan){
    if(match.status !== "已结束" || !match.finalScore) return null;
    let [hReal,aReal] = match.finalScore.split("-").map(Number);
    let res = "";

    // 判定保本方案
    let safeOk = false;
    if(plan.type==="home" && hReal>aReal) safeOk=true;
    if(plan.type==="away" && aReal>hReal) safeOk=true;
    if(plan.type==="draw" && hReal===aReal) safeOk=true;
    if(xg.big && (hReal+aReal)>=3) safeOk=true;

    // 判定激进方案
    let riskOk = false;
    if(plan.type==="home" && hReal>aReal && (hReal+aReal)>=3) riskOk=true;
    if(plan.type==="away" && aReal>hReal && (hReal+aReal)>=3) riskOk=true;
    if(plan.type==="draw" && hReal===aReal && (hReal+aReal)<=2) riskOk=true;

    return {safeOk,riskOk};
}

// 写入本地命中率
function saveJudge(matchName,judge){
    const exist = historyData.list.find(x=>x.name===matchName);
    if(exist) return;

    historyData.total++;
    if(judge.safeOk) historyData.safeHit++; else historyData.safeMiss++;
    if(judge.riskOk) historyData.riskHit++; else historyData.riskMiss++;
    historyData.list.push({name:matchName,...judge});

    localStorage.setItem("matchHistory",JSON.stringify(historyData));
}

// ==================== 5. 渲染页面 ====================
function render(){
    // 更新顶部统计面板
    document.getElementById("totalCount").innerText = historyData.total;
    document.getElementById("safeHit").innerText = historyData.safeHit;
    document.getElementById("safeMiss").innerText = historyData.safeMiss;
    document.getElementById("riskHit").innerText = historyData.riskHit;
    document.getElementById("riskMiss").innerText = historyData.riskMiss;

    let safeRate = historyData.total ? ((historyData.safeHit/historyData.total)*100).toFixed(1)+"%" : "0%";
    let riskRate = historyData.total ? ((historyData.riskHit/historyData.total)*100).toFixed(1)+"%" : "0%";
    document.getElementById("safeRate").innerText = safeRate;
    document.getElementById("riskRate").innerText = riskRate;

    // 切换复盘面板显示
    document.getElementById("statBlock").style.display = showStat?"block":"none";

    let list = currentLeague==="all"?ALL_MATCHES:ALL_MATCHES.filter(m=>m.league===currentLeague);
    let html = "";

    list.forEach(m=>{
        let xg = calcXG(m.home,m.away);
        let plan = getPlan(xg);
        let judge = judgeResult(m,xg,plan);
        if(judge) saveJudge(`${m.home}vs${m.away}`,judge);

        html += `
        <div class="card">
            <div class="title">【${m.league}】${m.home} VS ${m.away}</div>
            <div class="info">时间：${m.time}｜状态：${m.status}｜最终比分：${m.finalScore||m.score}</div>
            <div class="grid">
                <div class="box">
                    <h4>🎯 xG预期进球</h4>
                    <div class="xg">主队：${xg.hx}</div>
                    <div class="xg">客队：${xg.ax}</div>
                    <div class="xg">总${xg.total}｜${xg.big?"倾向大球":"倾向小球"}</div>
                </div>
                <div class="box">
                    <h4>✅ 赛前推荐</h4>
                    <div class="safe">保本：${plan.safe}</div>
                    <div class="risk">激进：${plan.risk}</div>
                </div>
                <div class="box">
                    <h4>📝 赛后判定</h4>
                    ${judge?`
                    <div class="${judge.safeOk?'hit':'miss'}">保本方案：${judge.safeOk?"命中✔":"失误✘"}</div>
                    <div class="${judge.riskOk?'hit':'miss'}">激进方案：${judge.riskOk?"命中✔":"失误✘"}</div>
                    `:`<div style="color:#aaa">比赛未结束<br>等待复盘</div>`}
                </div>
            </div>
        </div>`;
    });
    document.getElementById("container").innerHTML = html;
}

// ==================== 6. 切换按钮 ====================
function showAll(){currentLeague="all";showStat=false;setActive(0);render();}
function showLeague(t){currentLeague=t;showStat=false;render();}
function showHistory(){showStat=true;render();}
function setActive(idx){
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".nav button")[idx].classList.add("active");
}

// ==================== 7. 自动运行 ====================
window.onload = ()=>{render();setInterval(render,30000);};
</script>
</body>
</html>
