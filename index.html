<style>

.refreshBtn{display:block;margin:20px auto;padding:12px 26px;background:#17a2b8;color:#fff;border:none;border-radius:8px;cursor:pointer}
.hit{color:#69f0ae}.miss{color:#ff5252}

<body>

<h1>⚽ 欧冠1/4决赛专属预测系统</h1>
<p class="desc">官方真实赛程｜完整年月日｜xG预期｜20元保守/激进｜自动复盘算胜率</p>

<button class="refreshBtn" onclick="initData()">🔄 刷新赛事 & 更新复盘</button>

<div id="matchWrap">加载欧冠1/4决赛赛事中...</div>

<div class="statBox">

</div>

<script>

    }
  ];
}

function judgeResult(m){
  if(m.status !== "已结束" || !m.finalScore) return null;
  const [h,a] = m.finalScore.split("-").map(Number);
  const all = h+a;
  let safeOK = false, riskOK = false;

  if(m.safeTip.includes("主胜")&&h>a) safeOK=true;
  if(m.safeTip.includes("客胜")&&a>h) safeOK=true;
  if(m.safeTip.includes("平局")&&h===a) safeOK=true;
  if(m.safeTip.includes("≤2")&&all<=2) safeOK=true;
  if(m.safeTip.includes("≥3")&&all>=3) safeOK=true;

  if(m.riskTip.includes(m.finalScore)) riskOK=true;
  return {safeOK,riskOK};
}

function saveRecord(mkey,res){
  if(!res || record.list.includes(mkey))return;
  record.total++;
  res.safeOK?record.safeHit++:record.safeMiss++;
  res.riskOK?record.riskHit++:record.riskMiss++;
  record.list.push(mkey);
  localStorage.setItem("championsRecord",JSON.stringify(record));
}

function initData(){
  const list = getMatchList();
  let html = "";
  list.forEach(m=>{
    const j = judgeResult(m);
    saveRecord(m.key,j);
    html += `
    <div class="card">
      <div style="color:#ffd700;font-size:19px;margin-bottom:10px">${m.home} VS ${m.away}</div>
      <div class="row">
        <div class="item">📅 比赛时间：${m.date}</div>
        <div class="item">📈 xG预期：主${m.homeXg}｜客${m.awayXg}</div>
        <div class="item">🏆 当前比分：${m.liveScore}</div>
        <div class="item">⚽ 实时总进球：${m.totalGoals}</div>
        <div class="item">📌 状态：${m.status}</div>
        <div class="item">✅ 最终赛果：${m.finalScore||"未完结"}</div>
      </div>
      <div class="betBox">
        <div class="safe">${m.safeTip}</div>
        <div class="risk" style="margin-top:8px">${m.riskTip}</div>
      </div>
      ${j?`
      <div style="margin-top:10px">
        <span class="${j.safeOK?'hit':'miss'}">保守：${j.safeOK?'命中✔':'失误✘'}</span>
        &nbsp;&nbsp;
        <span class="${j.riskOK?'hit':'miss'}">激进：${j.riskOK?'命中✔':'失误✘'}</span>
      </div>
      `:""}
    </div>
    `;
  });
  document.getElementById("matchWrap").innerHTML = html;
  renderStat();
}

function renderStat(){
  const r = record;
  let safeRate = r.total?((r.safeHit/r.total)*100).toFixed(1)+"%":"0%";
  let riskRate = r.total?((r.riskHit/r.total)*100).toFixed(1)+"%":"0%";
  document.getElementById("statText").innerHTML = `
  总复盘场次：${r.total} 场<br>
  💚 20元保守方案：命中${r.safeHit}｜失误${r.safeMiss}｜综合胜率：${safeRate}<br>
  ❤️ 20元激进方案：命中${r.riskHit}｜失误${r.riskMiss}｜综合胜率：${riskRate}
  `;
}

window.onload = initData;
</script>
</body>
</html>
